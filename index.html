<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QA Portfolio - Marllulit González</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>QA Tester Portfolio</h1>
  <p>Manual Testing | SQL | API | BDD</p>
</header>

<section class="about">
  <img src="assets/profile/foto.png" alt="Foto perfil" width="200" onerror="this.src='https://via.placeholder.com/200?text=QA+Profile'">
  <div>
    <h2>Sobre mí</h2>
    <p>Soy QA Tester con más de 10 años de experiencia especializada en pruebas manuales, documentación técnica, SQL y validación de sistemas bancarios.</p>
  </div>
</section>

<section class="projects">
  <h2 style="text-align: center; margin-bottom: 20px;">Mis Proyectos y Documentación</h2>
  <div class="grid" id="projects-container"></div>
</section>

<section class="screenshots">
  <h2>Evidencia de Testing</h2>
  <div class="evidence-grid">
    <img src="assets/screenshots/testing-process.png" alt="Proceso de prueba" onerror="this.style.display='none'">
    <img src="assets/screenshots/bug-tracking.png" alt="Seguimiento de bugs" onerror="this.style.display='none'">
    <img src="assets/screenshots/gherkin-feature.png" alt="Gherkin Feature" onerror="this.style.display='none'">
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
